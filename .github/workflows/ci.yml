name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            Flask==3.0.0 \
            flask-cors==4.0.0 \
            "SQLAlchemy>=2.0.36,<3" \
            "alembic>=1.13.0,<2" \
            python-dotenv==1.0.0 \
            "requests>=2.32.3,<3"

      - name: Compile source
        run: python -m compileall app.py database.py license.py src tests -q

      - name: Run unit tests
        env:
          PYTHONPATH: src:.
        run: python -m unittest discover -s tests -p "test_*.py"

  package:
    name: Package Build Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
